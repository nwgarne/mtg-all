<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MTG by year - every Magic: the Gathering card by release year</title>
  <meta name="description" content="Browse every Magic: the Gathering card grouped by the year it released. Card counts, set counts, and live Scryfall prices for 34 years of Magic." />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0a0f0c" />

  <!-- Open Graph / social share preview -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MTG by year" />
  <meta property="og:title" content="MTG by year" />
  <meta property="og:description" content="Browse every Magic: the Gathering card by release year, with live prices." />
  <meta property="og:image" content="https://mtg-all.dirtyshoulders.com/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="MTG by year - every Magic: the Gathering card by release year" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://mtg-all.dirtyshoulders.com/og-image.jpg" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&family=Oswald:wght@500;700&family=IBM+Plex+Mono:wght@400&family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://cards.scryfall.io" crossorigin />

  <!-- Shared decks.dirtyshoulders visual system (already present in /styles). -->
  <link rel="stylesheet" href="/styles/tokens.css" />
  <link rel="stylesheet" href="/styles/global.css" />
  <link rel="stylesheet" href="/styles/hero.css" />
  <link rel="stylesheet" href="/styles/button.css" />
  <link rel="stylesheet" href="/styles/stat-row.css" />
  <link rel="stylesheet" href="/styles/card-tile.css" />
  <!-- Site-specific: shared chrome, then the homepage grid. -->
  <link rel="stylesheet" href="/styles/mtg-all.css" />
  <link rel="stylesheet" href="/styles/home.css" />
  <link rel="stylesheet" href="/styles/search.css" />

  <script src="/scripts/home.js" defer></script>
  <script src="/scripts/search.js" defer></script>
</head>
<body data-bracket="3">
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="mtg-topbar">
    <div class="mtg-topbar__inner">
      <a class="mtg-wordmark" href="/" aria-label="MTG by year, home">
        <span class="mtg-wordmark__mark">MTG</span>
        <span class="mtg-wordmark__dot" aria-hidden="true">·</span>
        <span class="mtg-wordmark__sub">by year</span>
      </a>
      <form class="mtg-search" role="search" autocomplete="off" novalidate>
        <input class="mtg-search__input" type="search" name="q"
               placeholder="Search a card..." aria-label="Search for a Magic card by name"
               aria-autocomplete="list" aria-expanded="false" autocomplete="off"
               autocapitalize="none" autocorrect="off" spellcheck="false" />
      </form>
    </div>
  </header>

  <main class="wrap wide" id="main" tabindex="-1">
    <section class="hero">
      <div class="hero__kicker reveal d1"><span>Every Magic card, by release year</span></div>
      <h1 class="hero__title hero__title--mega reveal d1">
        <span class="hero__title-stroke">MTG</span>
        <span>by <span class="hero__title-accent">year.</span></span>
      </h1>
      <p class="hero__tagline reveal d2" id="hero-tagline" data-fallback="Every Magic: the Gathering card, grouped by the year it released.">
        Every Magic: the Gathering card, grouped by the year it released.
      </p>
    </section>

    <section class="section">
      <span class="section__num">// The archive</span>
      <h2 class="section__title">Every year.</h2>
      <div class="year-grid" id="year-grid">
        <p class="year-grid__status">Loading years…</p>
      </div>
    </section>
  </main>
</body>
</html>
